name: Sync fnOS Docs

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync docs
        run: python -u scripts/sync_fnnas_docs.py

      - name: Build workflow summary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          summary = json.loads(Path("sync-summary.json").read_text(encoding="utf-8"))
          lines = [
              "# 同步结果",
              "",
              f"- 文档页面数: {summary['pages']}",
              f"- Markdown 文件数: {summary['markdown_files']}",
              f"- 资源文件数: {summary['asset_files']}",
              f"- 文档索引: `{summary['docs_index']}`",
              f"- 单文件合集: `{summary['all_docs']}`",
          ]
          Path(Path.cwd() / Path(".github_step_summary_tmp")).write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY
          cat .github_step_summary_tmp >> "$GITHUB_STEP_SUMMARY"
          cat .github_step_summary_tmp
          rm -f .github_step_summary_tmp

      - name: Commit and push changes
        run: |
          if git diff --quiet -- docs assets ALL_DOCS.md README.md; then
            echo "No documentation changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs assets ALL_DOCS.md README.md
          git commit -m "chore: sync fnOS docs"
          git push
